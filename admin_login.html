<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <header class="header">
        <div class="logo-section">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo" alt="Event Hub Logo">
            <h1>Admin Access</h1>
        </div>
        <a href="{{ url_for('index') }}" class="top-btn">Back</a>
    </header>

    <main class="page-center">
        <div class="form-card admin-card glass-card">
            <h2>Admin Login</h2>
            <p class="sub-text">Enter your credentials to access dashboard.</p>

            {% if error_message %}
                <div class="error-box">{{ error_message }}</div>
            {% endif %}

            <form method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="main-btn">Login</button>
            </form>
        </div>
    </main>
</body>
</html>
